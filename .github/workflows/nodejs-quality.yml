name: Node.js Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nodejs-check:
    name: Node.js Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: 'pnpm'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check libraries
        run: pnpm run typecheck:libs

      - name: Type check API
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Run API tests
        run: pnpm --filter @workspace/api-server run test

      - name: Run preflight tests
        run: pnpm --filter @workspace/api-server run test -- src/services/preflight.test.ts

      - name: Run execution controls tests
        run: pnpm --filter @workspace/api-server run test -- src/services/executionControls.test.ts

      - name: Verify build artifacts
        run: |
          test -f api/dist/index.mjs || (echo "API build failed: dist/index.mjs missing" && exit 1)
          test -f lib/api-zod/dist/index.d.ts || (echo "API zod types missing" && exit 1)
          echo "✓ Build artifacts verified"

      - name: Run security audit
        run: |
          pnpm audit --audit-level moderate || true  # Don't fail on minor issues
          pnpm --filter @workspace/api-server audit
          pnpm --filter @workspace/db audit

      - name: Check for secrets in code
        run: |
          # Simple secret scanning - fail on common patterns
          if git diff HEAD~1 HEAD --name-only | grep -E '\.(env|json|yaml|yml|toml)$' > /dev/null; then
            echo "Checking environment files for secrets..."
            grep -P "(?i)(password|secret|key|token|private)" .env.example || true
            grep -P "0x[a-fA-F0-9]{64}" .env || true
          fi
