databases:
  - name: allbright-db
    plan: starter

services:
  - type: web
    name: allbright-solver
    env: docker
    plan: starter
    branch: main
    rootDir: solver
    buildCommand: cargo build --release
    runCommand: ./target/release/allbright
    healthCheckPath: /health
    healthCheckTimeout: 10
    envVars:
      - key: ETH_WS_URL
        value: wss://ethereum-rpc.publicnode.com
      - key: BASE_WS_URL
        value: wss://base-rpc.publicnode.com
      - key: ARBITRUM_WS_URL
        value: wss://arbitrum-rpc.publicnode.com
      - key: OPTIMISM_WS_URL
        value: wss://optimism-rpc.publicnode.com
      - key: POLYGON_WS_URL
        value: wss://polygon-rpc.publicnode.com
      - key: AVALANCHE_WS_URL
        value: wss://avalanche-rpc.publicnode.com
      - key: BSC_WS_URL
        value: wss://bsc-rpc.publicnode.com
      - key: FANTOM_WS_URL
        value: wss://fantom-rpc.publicnode.com
      - key: RUST_LOG
        value: info
      - key: INTERNAL_BRIDGE_PORT
        value: "4003"
      - key: PORT
        value: "4003"

  - type: web
    name: allbright-api
    env: node
    plan: starter
    rootDir: api
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.mjs
    healthCheckPath: /api/health
    database: allbright-db
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: PROFIT_WALLET_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "8453" # Default to Base for lower gas
      - key: RPC_ENDPOINT
        value: https://base.llamarpc.com
      - key: ETH_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BSC_RPC_URL
        sync: false
      - key: ARBITRUM_RPC_URL
        sync: false
      - key: OPTIMISM_RPC_URL
        sync: false
      - key: AVALANCHE_RPC_URL
        sync: false
      - key: FANTOM_RPC_URL
        sync: false
      - key: PAPER_TRADING_MODE
        value: "false"
      - key: MEV_PROTECTION
        value: "true"
      - key: USE_TCP_BRIDGE
        value: "true"
      - key: allbright_TCP_HOST
        value: allbright-solver
      - key: allbright_TCP_PORT
        value: "4003"
      - key: DATABASE_URL
        fromDatabase: allbright-db
      - key: APP_INITIAL_SETUP
        value: "true"
      - key: PRE_FLIGHT_STRICT
        value: "false"

      - key: CORS_ORIGINS
        value: https://allbright-ez5o.onrender.com
      - key: UI_URL
        value: https://allbright-ez5o.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: allbright-dashboard
    env: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter ui build
    publishDirectory: ui/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://allbright-api.onrender.com
      - key: NODE_ENV
        value: production

