databases:
  - name: allbright-db
    plan: starter

services:


# ─────────────────────────────────────────────
  # SERVICE 2: Node.js API (Docker)
  # ─────────────────────────────────────────────
  - type: web
    name: allbright-api
    env: docker
    plan: starter
    rootDir: .
    dockerfilePath: api/Dockerfile
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    startPeriod: 120s
    database: allbright-db
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: SKIP_GATE
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
- key: WALLET_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: PROFIT_WALLET_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "8453"
      - key: RPC_ENDPOINT
        value: https://base.llamarpc.com
      - key: ETH_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BSC_RPC_URL
        sync: false
      - key: ARBITRUM_RPC_URL
        sync: false
      - key: OPTIMISM_RPC_URL
        sync: false
      - key: AVALANCHE_RPC_URL
        sync: false
      - key: FANTOM_RPC_URL
        sync: false
      - key: PAPER_TRADING_MODE
        value: "false"
      - key: MEV_PROTECTION
        value: "true"
      - key: USE_TCP_BRIDGE
        value: "false"
      - key: DATABASE_URL
        fromDatabase: allbright-db
      - key: APP_INITIAL_SETUP
        value: "true"
      - key: PRE_FLIGHT_STRICT
        value: "false"
      - key: CORS_ORIGINS
        value: https://allbright-i03f.onrender.com
      - key: UI_URL
        value: https://allbright-i03f.onrender.com

# ─────────────────────────────────────────────
  # SERVICE 3: Dashboard (Docker with nginx for SPA fallback)
  # ─────────────────────────────────────────────
  - type: web
    name: allbright-dashboard
    env: docker
    plan: starter
    rootDir: .
    dockerfilePath: ui/Dockerfile
    healthCheckPath: /
    healthCheckTimeout: 60
    startPeriod: 60s
    envVars:
      - key: VITE_API_BASE_URL
        value: https://allbright-api.onrender.com
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: ""
