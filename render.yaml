services:
  - type: web
    name: brightsky
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: INTERNAL_BRIDGE_PORT
        value: "4001"
      - key: PRE_FLIGHT_STRICT
        value: "true"
      - key: SUDO_CONFIRMATION_ENABLED
        value: "false"
      - key: EXECUTOR_CODE_HASH
        value: "0x6f2a4c10da345e0d48f2b1c93a9b1e7f3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f"
      - key: CHAIN_ID
        value: "8453"
      - key: PIMLICO_NETWORK
        value: base
      - key: MAX_PAIRS_TO_SCAN
        value: "2500"
      - key: SCAN_CONCURRENCY
        value: "8"
      - key: MEV_PROTECTION
        value: "true"
      - key: FLASH_LOAN_MAX
        value: "100000000"
      - key: RPC_ENDPOINT
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: WALLET_ADDRESS
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
      - key: PIMLICO_BUNDLER_URL
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
