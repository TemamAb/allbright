databases:
  - name: allbright-db
    plan: starter

services:
  # ─────────────────────────────────────────────
  # SERVICE 1: Rust Solver (Docker)
  # Render assigns PORT automatically — do NOT override it.
  # The solver binds to $PORT so Render can route traffic to /health.
  # INTERNAL_BRIDGE_PORT is used only for API→Solver IPC config reference.
  # ─────────────────────────────────────────────
  - type: web
    name: allbright-solver
    env: docker
    plan: starter
    branch: main
    rootDir: solver
    healthCheckPath: /health
    healthCheckTimeout: 30
    envVars:
      - key: ETH_WS_URL
        value: wss://ethereum-rpc.publicnode.com
      - key: BASE_WS_URL
        value: wss://base-rpc.publicnode.com
      - key: ARBITRUM_WS_URL
        value: wss://arbitrum-rpc.publicnode.com
      - key: OPTIMISM_WS_URL
        value: wss://optimism-rpc.publicnode.com
      - key: POLYGON_WS_URL
        value: wss://polygon-rpc.publicnode.com
      - key: AVALANCHE_WS_URL
        value: wss://avalanche-rpc.publicnode.com
      - key: BSC_WS_URL
        value: wss://bsc-rpc.publicnode.com
      - key: FANTOM_WS_URL
        value: wss://fantom-rpc.publicnode.com
      - key: RUST_LOG
        value: info
      - key: SKIP_GATE
        value: "true"
      # NOTE: PORT is intentionally NOT set here — Render injects it automatically.
      # The solver reads $PORT at runtime in main.rs.

  # ─────────────────────────────────────────────
  # SERVICE 2: Node.js API (Docker)
  # ─────────────────────────────────────────────
  - type: web
    name: allbright-api
    env: docker
    plan: starter
    rootDir: .
    dockerfilePath: api/Dockerfile
    healthCheckPath: /api/health
    healthCheckTimeout: 30
    startPeriod: 120s
    database: allbright-db
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_GATE
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: PIMLICO_API_KEY
        sync: false
- key: WALLET_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: PROFIT_WALLET_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "8453"
      - key: RPC_ENDPOINT
        value: https://base.llamarpc.com
      - key: ETH_RPC_URL
        sync: false
      - key: BASE_RPC_URL
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BSC_RPC_URL
        sync: false
      - key: ARBITRUM_RPC_URL
        sync: false
      - key: OPTIMISM_RPC_URL
        sync: false
      - key: AVALANCHE_RPC_URL
        sync: false
      - key: FANTOM_RPC_URL
        sync: false
      - key: PAPER_TRADING_MODE
        value: "false"
      - key: MEV_PROTECTION
        value: "true"
      - key: USE_TCP_BRIDGE
        value: "true"
      - key: allbright_TCP_HOST
        value: allbright-solver
      - key: allbright_TCP_PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase: allbright-db
      - key: APP_INITIAL_SETUP
        value: "true"
      - key: PRE_FLIGHT_STRICT
        value: "false"
      - key: CORS_ORIGINS
        value: https://allbright-i03f.onrender.com
      - key: UI_URL
        value: https://allbright-i03f.onrender.com

# ─────────────────────────────────────────────
  # SERVICE 3: Dashboard (Docker with nginx for SPA fallback)
  # ─────────────────────────────────────────────
  - type: web
    name: allbright-dashboard
    env: docker
    plan: starter
    rootDir: ui
    dockerfilePath: Dockerfile
    healthCheckPath: /
    healthCheckTimeout: 60
    startPeriod: 60s
    envVars:
      - key: VITE_API_BASE_URL
        value: https://allbright-api.onrender.com
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: ""
