services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: allbright
      POSTGRES_USER: allbright
      POSTGRES_PASSWORD: allbright
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allbright -d allbright"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - allbright-postgres:/var/lib/postgresql/data

  solver:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PRE_FLIGHT_STRICT: "false"
      INTERNAL_BRIDGE_PORT: "4001"
      FLASH_EXECUTOR_ADDRESS: ${FLASH_EXECUTOR_ADDRESS}
      BASE_WS_URL: "wss://base-rpc.publicnode.com"
      allbright_SOCKET_PATH: /ipc/allbright_bridge.sock
      EXECUTOR_CODE_HASH: "0x6f2a4c10da345e0d48f2b1c93a9b1e7f3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f"
      CHAIN_ID: "8453"
      PIMLICO_NETWORK: base
      MAX_PAIRS_TO_SCAN: "2500"
      SCAN_CONCURRENCY: "8"
      MEV_PROTECTION: "true"
      FLASH_LOAN_MAX: "100000000"
      PIMLICO_API_KEY: ${PIMLICO_API_KEY}
      RPC_ENDPOINT: ${RPC_ENDPOINT}
    volumes:
      - allbright-ipc:/ipc

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "10000:10000"
    environment:
      NODE_ENV: development
      PORT: "10000"
      DATABASE_URL: postgresql://allbright:allbright@postgres:5432/allbright
      INTERNAL_BRIDGE_PORT: "4001"
      allbright_SOCKET_PATH: /ipc/allbright_bridge.sock
      PRE_FLIGHT_STRICT: "false"
      PAPER_TRADING_MODE: "false"
      SUDO_CONFIRMATION_ENABLED: "false"
      EXECUTOR_CODE_HASH: "0x6f2a4c10da345e0d48f2b1c93a9b1e7f3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f"
      CHAIN_ID: "8453"
      PIMLICO_NETWORK: base
      MAX_PAIRS_TO_SCAN: "2500"
      SCAN_CONCURRENCY: "8"
      MEV_PROTECTION: "true"
      FLASH_LOAN_MAX: "100000000"
      PIMLICO_API_KEY: ${PIMLICO_API_KEY}
      RPC_ENDPOINT: ${RPC_ENDPOINT}
      PRIVATE_KEY: ${PRIVATE_KEY}
      WALLET_ADDRESS: ${WALLET_ADDRESS}
      FLASH_EXECUTOR_ADDRESS: ${FLASH_EXECUTOR_ADDRESS}
      ETH_RPC_URL: ${ETH_RPC_URL}
      BASE_RPC_URL: ${BASE_RPC_URL}
    depends_on:
      postgres:
        condition: service_healthy
      solver:
        condition: service_started
    volumes:
      - allbright-ipc:/ipc
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:10000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:10000
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  allbright-ipc:
  allbright-postgres:
