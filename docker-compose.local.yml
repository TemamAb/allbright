version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allbright}
      POSTGRES_USER: ${POSTGRES_USER:-allbright}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-allbright}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: http://api:3001 # Internal Docker network name
      DATABASE_URL: postgres://${POSTGRES_USER:-allbright}:${POSTGRES_PASSWORD:-allbright}@postgres:5432/${POSTGRES_DB:-allbright}
      # Add other required API environment variables here, e.g., PIMLICO_API_KEY, PRIVATE_KEY
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    restart: always
    ports:
      - "3002:80"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_BASE_URL: http://localhost:3001 # For UI to connect to local API
    depends_on:
      - api

  solver:
    build:
      context: .
      dockerfile: solver/Dockerfile
    restart: always
    # Solver port 3003 is for IPC, not typically exposed directly for HTTP access
    # - "3003:3003" # Uncomment if you need to access solver directly from host
    depends_on:
      - api

volumes:
  postgres_data: